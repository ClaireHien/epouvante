<div class="user-list-container">
  <h2 class="text-3xl font-bold underline">Liste des utilisateurs</h2>
  
  <!-- <button (click)="loadUsers()">Actualiser la liste</button>-->

  <table border="1" style="margin-top: 20px; width: 100%;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Email</th>
        <th>Date d'inscription</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of users">
        <td>{{ u.id }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.created_at | date:'dd/MM/yyyy' }}</td>
      </tr>
      <tr *ngIf="users.length === 0">
        <td colspan="4" style="text-align: center;">Aucun utilisateur trouvé.</td>
      </tr>
    </tbody>
  </table>

  <hr>
  <!-- <button (click)="logout()">Se déconnecter</button> -->
</div>
