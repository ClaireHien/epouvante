<div class="relative min-h-screen w-full flex items-center justify-center bg-zinc-950 overflow-hidden">
  
  <div class="fixed inset-0 z-0 pointer-events-none opacity-20 grayscale transition-all duration-1000">
    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('assets/hanted-mansion.png');"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent"></div>
  </div>

  <div class="relative z-10 w-full max-w-md p-8 m-4 bg-zinc-900/80 backdrop-blur-xl border border-emerald-900/30 rounded-3xl shadow-2xl">
    
    <div class="text-center mb-10">
      <h2 class="font-serif text-3xl text-emerald-400 italic">Connexion</h2>
      <p class="text-zinc-500 text-xs uppercase tracking-[0.3em] mt-2">Entrez dans l'antre</p>
    </div>

    <form (submit)="onLogin()" class="space-y-6">
      <div class="space-y-2">
        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider ml-1">Email de l'abonné</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required
          class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-zinc-200 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 transition-all placeholder:text-zinc-700"
          placeholder="nom@email.com">
      </div>

      <div class="space-y-2">
        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider ml-1">Mot de passe secret</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required
          class="w-full px-4 py-3 bg-zinc-950 border border-zinc-800 rounded-xl text-zinc-200 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 transition-all placeholder:text-zinc-700"
          placeholder="••••••••">
      </div>

      <button type="submit" 
        class="w-full py-4 bg-gradient-to-r from-emerald-900 to-emerald-700 hover:from-emerald-700 hover:to-emerald-600 text-white font-bold uppercase tracking-widest rounded-xl shadow-lg shadow-emerald-900/20 transition-all transform hover:-translate-y-0.5 active:scale-95">
        S'authentifier
      </button>
    </form>

    <div class="mt-8 text-center text-sm text-zinc-500">
      Pas encore inscrit ? 
      <a routerLink="/register" class="text-emerald-400 hover:text-emerald-300 font-bold transition-colors ml-1">Créer un compte</a>
    </div>
  </div>
</div>
